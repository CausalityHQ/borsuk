name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  repo-policy:
    name: Repo policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Repo policy
        run: python scripts/check_repo_policy.py

  crates-io:
    name: Publish Rust crate
    needs: repo-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Package
        run: cargo package --locked -p borsuk
      - name: Publish
        run: cargo publish --locked -p borsuk --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  pypi-build:
    name: Build Python wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: repo-policy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, macos-15-intel, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.11.5
          command: build
          args: --locked --release --compatibility pypi --out dist
          manylinux: "2_28"
          rust-toolchain: stable
          working-directory: python
      - name: Test built wheel
        shell: bash
        working-directory: python
        run: |
          wheel="$(ls dist/borsuk-*.whl | head -1)"
          python -m pip install "$wheel"
          BORSUK_WHEEL_PATH="$wheel" python -m unittest discover tests
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: python/dist/*

  pypi:
    name: Publish Python package
    needs: pypi-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: python/dist
          merge-multiple: true
      - name: Assert Python wheel coverage
        shell: bash
        run: |
          compgen -G "python/dist/borsuk-*cp312-*.whl" >/dev/null
          compgen -G "python/dist/borsuk-*cp313-*.whl" >/dev/null
          compgen -G "python/dist/borsuk-*cp314-*.whl" >/dev/null
          compgen -G "python/dist/borsuk-*manylinux*x86_64.whl" >/dev/null
          compgen -G "python/dist/borsuk-*macosx*x86_64.whl" >/dev/null
          compgen -G "python/dist/borsuk-*macosx*arm64.whl" >/dev/null
          compgen -G "python/dist/borsuk-*win_amd64.whl" >/dev/null
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  npm-native:
    name: Build TypeScript native artifact (${{ matrix.os }})
    needs: repo-policy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, macos-15-intel, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/borsuk/package-lock.json
      - name: Build native addon
        working-directory: packages/borsuk
        shell: bash
        run: |
          npm ci
          npm run build:native
          npm test
      - name: Collect native artifact
        shell: bash
        working-directory: packages/borsuk
        run: |
          mkdir -p native-artifacts
          find . -maxdepth 1 -name "index.*.node" -exec cp {} native-artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.os }}
          path: packages/borsuk/native-artifacts/*.node

  npm:
    name: Publish TypeScript package
    needs: npm-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/borsuk/package-lock.json
      - name: Build
        working-directory: packages/borsuk
        run: |
          npm ci
          npm run build:native
      - uses: actions/download-artifact@v4
        with:
          pattern: node-native-*
          path: packages/borsuk/native-artifacts
          merge-multiple: true
      - name: Include native artifacts
        shell: bash
        working-directory: packages/borsuk
        run: find native-artifacts -name '*.node' -exec cp {} . \;
      - name: Assert native artifact coverage
        shell: bash
        working-directory: packages/borsuk
        run: |
          test -f index.cjs
          test -f native.d.ts
          compgen -G "index.linux-*.node" >/dev/null
          test -f index.darwin-arm64.node
          test -f index.darwin-x64.node
          compgen -G "index.win32-*.node" >/dev/null
      - name: Test package
        working-directory: packages/borsuk
        run: npm test
      - name: Check package contents
        working-directory: packages/borsuk
        run: npm pack --dry-run --json
      - name: Publish
        working-directory: packages/borsuk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
