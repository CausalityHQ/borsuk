services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command:
      - server
      - -dir=/data
      - -master.port=9333
      - -volume.port=8080
      - -filer
      - -filer.port=8888
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro

volumes:
  seaweedfs-data:
